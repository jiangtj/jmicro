main:
  push:
    - imports: https://cnb.cool/jiangtj/secret/-/blob/main/github-sync-envs.yml
      stages:
        - name: sync to github
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/jiangtj/jmicro.git
            auth_type: https
            username: ${GITHUB_SYNC_USERNAME}
            password: ${GITHUB_SYNC_TOKEN}
  "crontab: 0 1 * * *": # 每天1点执行
    - name: sync from github
      stages:
        - name: sync from github
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/jiangtj/jmicro.git
            auth_type: https
            username: ${GITHUB_SYNC_USERNAME}
            password: ${GITHUB_SYNC_TOKEN}
            sync_mode: pull